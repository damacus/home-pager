# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate

on:
  push:
    branches: ["main"]
    paths:
      - .renovaterc.json5
      - .renovate/**.json5
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        type: boolean
        default: false
        required: true
      logLevel:
        description: Log Level
        type: choice
        default: debug
        options:
          - debug
          - info
        required: true
      version:
        description: Renovate Version
        default: latest
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  main:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      RENOVATE_APP_ID: ${{ vars.BOT_APP_ID || secrets.BOT_APP_ID }}
      RENOVATE_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}
    steps:
      - name: Generate App Token
        if: ${{ env.RENOVATE_APP_ID != '' && env.RENOVATE_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          app-id: "${{ env.RENOVATE_APP_ID }}"
          private-key: "${{ env.RENOVATE_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: "${{ steps.app-token.outputs.token || secrets.RENOVATE_TOKEN || github.token }}"

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        env:
          LOG_LEVEL: "${{ inputs.logLevel || 'debug' }}"
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository }}"
          RENOVATE_DRY_RUN: "${{ inputs.dryRun }}"
          RENOVATE_INTERNAL_CHECKS_FILTER: strict
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: true
        with:
          token: "${{ steps.app-token.outputs.token || secrets.RENOVATE_TOKEN || github.token }}"
          renovate-version: "${{ inputs.version || 'latest' }}"
